spring.datasource.url=jdbc:postgresql://postgres:5432/coffee_db
spring.datasource.username=coffee_user
spring.datasource.password=coffee_pass

server.port=8080

spring.jpa.hibernate.ddl-auto=update

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.url=/openapi.yaml

management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://tempo:4318/v1/traces
management.opentelemetry.resource-attributes.service.name=coffee-app
management.otlp.metrics.export.enabled=false