openapi: 3.0.3
info:
  title: Сервис управления кофемашиной
  description: API сервиса управления кофемашиной
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Local development server

tags:
  - name: Drinks
  - name: Orders
  - name: Inventory
  - name: Statistics

paths:
  /drinks:
    get:
      tags: [Drinks]
      summary: Get all available drinks
      responses:
        '200':
          description: List of drinks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Drink'

    post:
      tags: [Drinks]
      summary: Create a new drink recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDrinkRequest'
      responses:
        '201':
          description: Drink created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Drink'

  /drinks/{drinkId}:
    parameters:
      - name: drinkId
        in: path
        required: true
        schema:
          type: integer

    get:
      tags: [Drinks]
      summary: Get drink by id
      responses:
        '200':
          description: Drink details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Drink'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Drinks]
      summary: Update drink recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDrinkRequest'
      responses:
        '200':
          description: Updated drink
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Drink'

    delete:
      tags: [Drinks]
      summary: Delete drink recipe
      responses:
        '204':
          description: Drink deleted

  /orders:
    post:
      tags: [Orders]
      summary: Order a drink
      description: |
        Attempts to prepare a drink using the current machine inventory.
        If ingredients are insufficient the request fails.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '200':
          description: Drink prepared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '409':
          description: Not enough ingredients
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /inventory:
    get:
      tags: [Inventory]
      summary: Get machine ingredient inventory
      responses:
        '200':
          description: Current machine inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inventory'

  /statistics/popular-drinks:
    get:
      tags: [Statistics]
      summary: Get most popular drinks
      responses:
        '200':
          description: Drink popularity statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DrinkStatistics'

components:

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    Drink:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        water:
          type: integer
          description: ml of water required
        milk:
          type: integer
          description: ml of milk required
        coffeeBeans:
          type: integer
          description: grams of coffee beans required

    CreateDrinkRequest:
      type: object
      required: [name, water, milk, coffeeBeans]
      properties:
        name:
          type: string
        water:
          type: integer
        milk:
          type: integer
        coffeeBeans:
          type: integer

    UpdateDrinkRequest:
      type: object
      properties:
        name:
          type: string
        water:
          type: integer
        milk:
          type: integer
        coffeeBeans:
          type: integer

    OrderRequest:
      type: object
      required: [drinkId]
      properties:
        drinkId:
          type: integer

    OrderResponse:
      type: object
      properties:
        message:
          type: string
          example: "Drink prepared successfully"
        drink:
          $ref: '#/components/schemas/Drink'

    Inventory:
      type: object
      properties:
        water:
          type: integer
        milk:
          type: integer
        coffeeBeans:
          type: integer

    DrinkStatistics:
      type: object
      properties:
        drinkId:
          type: integer
        drinkName:
          type: string
        ordersCount:
          type: integer

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
